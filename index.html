<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Dashboard Ultimate Full</title>
<style>
  :root { --bg-grad1:#111827; --accent:#2563EB; }
  body { margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif; color: #fff; background: var(--bg-grad1); min-height: 100vh; }
  .btn { padding: 12px 20px; border-radius: 8px; cursor: pointer; color: white; border: none; background: var(--accent); font-weight: bold; transition: transform 0.1s; }
  .btn:active { transform: scale(0.95); }
  .row-selected { background-color: #1f2937 !important; }
  .row-check { transform: scale(1.5); cursor: pointer; }
  #ctrlPanel { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1a1d26; padding: 15px; display: none; border-radius: 12px; border: 1px solid #374151; z-index: 100; box-shadow: 0 10px 15px rgba(0,0,0,0.5); text-align: center; }
  table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #111; border-radius: 10px; overflow: hidden; }
  th, td { padding: 15px; border-bottom: 1px solid #1f2937; text-align: left; }
  .tab-btn { background: #374151; margin-right: 5px; }
  .tab-btn.active { background: var(--accent); }
  .modal { display:none; position:fixed; top:10%; left:20%; background:#1a1d26; padding:20px; z-index:200; border-radius:12px; border:1px solid #374151; width: 60%; }
  /* Loading Spinner */
  .spinner { border: 5px solid #f3f3f3; border-top: 5px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- Loading Popup -->
<div id="loadingModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center; flex-direction:column;">
  <div class="spinner"></div>
  <p style="margin-top:20px; font-size:20px; font-weight:bold;">กำลังประมวลผล (Processing)...</p>
</div>

<div id="loginOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#111827; z-index:9999; display:flex; justify-content:center; align-items:center;">
  <div style="background:#1a1d26; padding:30px; border-radius:15px; border:1px solid #374151; text-align:center;">
    <h2>ใส่รหัสผ่าน</h2>
    <input type="password" id="passInput" style="padding:10px; border-radius:8px; border:none; width:200px;">
    <br><br><button class="btn" onclick="verify()">เข้าใช้งาน</button>
  </div>
</div>

<div id="tabBar" style="margin-bottom: 20px;"></div>
<button class="btn" onclick="addTab()">+ แฟ้ม</button>
<button class="btn" style="background:#ef4444" onclick="removeTab()">- ลบแฟ้ม</button>
<button class="btn" onclick="showModal('modalAdd')">+ ข้อมูล</button>
<button class="btn" style="background:#059669" onclick="showModal('modalAPI')">⚙️ ตั้งค่า API</button>

<div id="statusLabel" style="margin-top:10px; color:#9ca3af;">เลือก: 0</div>

<table>
  <thead><tr><th><input type="checkbox" id="selectAll" class="row-check" onclick="toggleSelectAll()"></th><th>USERNAME</th><th>STATUS</th></tr></thead>
  <tbody id="tableBody"></tbody>
</table>

<div id="ctrlPanel">
  <button class="btn" style="background:#374151" onclick="copyData('username')">User</button>
  <button class="btn" style="background:#374151" onclick="copyData('password')">Pass</button>
  <button class="btn" style="background:#374151" onclick="copyData('userpass')">U:P</button>
  <button class="btn" style="background:#374151" onclick="copyData('cookie')">Cookie</button>
  <button class="btn" style="background:#10b981" onclick="copyData('full')">Full</button>
  <button class="btn" style="background:#0891b2" onclick="startCheck()">Check (ZP)</button>
  <button class="btn" style="background:#ef4444" onclick="deleteSelected()">Delete</button>
</div>

<div id="modalAdd" class="modal">
  <h2>เพิ่มข้อมูล</h2>
  <textarea id="dataInput" style="width:100%; height:100px; background:#000; color:#fff;"></textarea>
  <br><br><button class="btn" onclick="saveData()">บันทึก</button>
  <button class="btn" style="background:#444" onclick="hideModals()">ปิด</button>
</div>

<div id="modalAPI" class="modal">
  <h2>ตั้งค่า ZeroPoint API Key</h2>
  <input type="text" id="apiKeyInput" placeholder="ZP_..." style="width:90%; padding:10px; background:#000; color:#fff;">
  <br><br>
  <button class="btn" onclick="saveAPI()">บันทึก</button>
  <button class="btn" style="background:#444" onclick="hideModals()">ปิด</button>
</div>

<script>
  // ** ใส่ URL ของ Google Apps Script ของคุณที่นี่ **
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx6pcvb2RoirPqVbojrA-Gqdqt_O4ltUMKbUBJRSQijLwHr_wljrWo8JO0pMUtbwSgdiA/exec";
  
  let tabs = [{ name: 'หลัก', data: [] }];
  let currentTab = 0;
  let apiKey = localStorage.getItem('zp_api_key') || '';

  function verify() { if (document.getElementById('passInput').value === "IWNR") { document.getElementById('loginOverlay').style.display = 'none'; loadFromSheet(); } else { alert("รหัสผ่านผิด!"); } }
  
  async function loadFromSheet() {

    try {

        const res = await fetch(WEB_APP_URL);
        const loaded = await res.json();

        tabs = loaded.map(t => ({
            name: t.name,
            data: (t.data || []).map(d => ({
                user: d.user || "",
                pass: d.pass || "",
                cookie: d.cookie || "",
                status: d.status || "-"
            }))
        }));

        render();

    } catch(err) {
        console.error(err);
        alert("โหลดข้อมูลจาก Google Sheet ไม่สำเร็จ");
    }

}

  async function saveToSheet() {

    try {

        const res = await fetch(WEB_APP_URL, {
            method: "POST",
            body: JSON.stringify(tabs)
        });

        const txt = await res.text();

        console.log("SAVE RESPONSE:", txt);

        const json = JSON.parse(txt);

        if (!json.success) {
            alert("บันทึกไม่สำเร็จ\n" + txt);
        }

    } catch (err) {

        console.error(err);

        alert("Save Error : " + err.message);

    }

}

  function addTab() {
    const name = prompt("ตั้งชื่อแฟ้ม:");
    if(name) { tabs.push({ name: name, data: [] }); saveToSheet().then(render); }
  }

  function removeTab() {
    if(tabs.length > 1) {
      if(confirm("ยืนยันการลบแฟ้มนี้?")) {
        tabs.splice(currentTab, 1);
        currentTab = 0;
        saveToSheet().then(render);
      }
    } else { alert("ต้องเหลือแฟ้มไว้อย่างน้อย 1 แฟ้ม"); }
  }

  function render() {
    document.getElementById('tabBar').innerHTML = tabs.map((t, i) => `<button class="btn tab-btn ${i === currentTab ? 'active' : ''}" onclick="currentTab=${i}; render()">${t.name}</button>`).join('');
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = tabs[currentTab].data.map((d, i) => `
      <tr id="row-${i}" onclick="toggleRow(${i})">
        <td><input type="checkbox" class="row-check" data-index="${i}" onchange="updateMenu()"></td>
        <td>${d.user||''}</td>
        <td>${d.status || '-'}</td>
      </tr>`).join('');
  }

  function updateMenu() {
    const checked = document.querySelectorAll('.row-check:checked:not(#selectAll)');
    document.getElementById('ctrlPanel').style.display = checked.length > 0 ? 'block' : 'none';
    document.getElementById('statusLabel').innerText = `เลือก: ${checked.length}`;
  }

  function copyData(type) {
    const text = Array.from(document.querySelectorAll('.row-check:checked:not(#selectAll)')).map(cb => {
      const d = tabs[currentTab].data[cb.dataset.index];
      if(type === 'username') return d.user;
      if(type === 'password') return d.pass;
      if(type === 'userpass') return `${d.user}:${d.pass}`;
      if(type === 'cookie') return d.cookie;
      return `${d.user}:${d.pass}:${d.cookie}`;
    }).join('\n');
    navigator.clipboard.writeText(text); alert('คัดลอกแล้ว!');
  }

  function deleteSelected() {
    Array.from(document.querySelectorAll('.row-check:checked:not(#selectAll)')).reverse().forEach(cb => tabs[currentTab].data.splice(cb.dataset.index, 1));
    saveToSheet().then(render);
  }

  function saveAPI() {
    localStorage.setItem('zp_api_key', document.getElementById('apiKeyInput').value);
    apiKey = document.getElementById('apiKeyInput').value;
    hideModals(); alert('บันทึก API Key แล้ว');
  }

  // --- ระบบ Check แบบ Proxy (ผ่าน Apps Script) ---
  async function startCheck() {
    if(!apiKey) return alert('โปรดใส่ API Key ก่อน');
    const selected = Array.from(document.querySelectorAll('.row-check:checked:not(#selectAll)')).map(cb => tabs[currentTab].data[cb.dataset.index]);
    const cookies = selected.map(d => d.cookie);
    
    document.getElementById('loadingModal').style.display = 'flex';

    // ส่งไปที่ Web App แทนการยิงตรง
    const res = await fetch(WEB_APP_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'check', cookies: cookies, apiKey: apiKey })
    });
    const data = await res.json();
    if(data.session_id) { pollStatus(data.session_id, selected); }
    else { document.getElementById('loadingModal').style.display = 'none'; alert('Error: ' + JSON.stringify(data)); }
  }

 async function pollStatus(sid, originalData) {
    const res = await fetch(WEB_APP_URL, {
      method: 'POST',
      body: JSON.stringify({
        action:'status',
        sid:sid,
        apiKey:apiKey,
        originalData:originalData
      })
    });

    const data = await res.json();

    if(data.status === 'completed') {

      data.results.forEach((resItem, idx) => {
        if(originalData[idx]){
            originalData[idx].status = resItem;
        }
      });

      saveToSheet().then(render);

      document.getElementById('loadingModal').style.display = 'none';

      alert('เช็คเสร็จสิ้น!');

    } else {
      setTimeout(() => pollStatus(sid, originalData), 3000);
    }
}

  function showModal(id) { 
    document.getElementById(id).style.display = 'block'; 
    if(id === 'modalAPI') { document.getElementById('apiKeyInput').value = apiKey; }
  }
  
  function hideModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
  function saveData() { 
    document.getElementById('dataInput').value.split('\n').forEach(l => { 
        if(l) {
            const p = l.split(':');
            tabs[currentTab].data.push({user: p[0]||'', pass: p[1]||'', cookie: p.slice(2).join(':'), status: '-'});
        }
    }); 
    saveToSheet().then(render); hideModals(); 
  }
  function toggleRow(i) { document.getElementById('row-'+i).classList.toggle('row-selected'); }
  function toggleSelectAll() { const isChecked = document.getElementById('selectAll').checked; document.querySelectorAll('.row-check').forEach(cb => cb.checked = isChecked); updateMenu(); }
</script>
</body>
</html>
