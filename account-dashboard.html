<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Dashboard Ultimate</title>
<style>
  :root { --bg-grad1:#111827; --bg-grad2:#1f2937; --accent:#2563EB; }
  body { margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif; color: #fff; background: var(--bg-grad1); min-height: 100vh; }
  .btn { padding: 12px 20px; border-radius: 8px; cursor: pointer; color: white; border: none; background: var(--accent); font-weight: bold; transition: transform 0.1s, background 0.2s; }
  .btn:active { transform: scale(0.95); }
  .row-selected { background-color: #1f2937 !important; transition: 0.3s; }
  .row-check { transform: scale(1.5); cursor: pointer; }
  #ctrlPanel { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1a1d26; padding: 15px; display: none; border-radius: 12px; border: 1px solid #374151; z-index: 100; box-shadow: 0 10px 15px rgba(0,0,0,0.5); text-align: center; }
  table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #111; border-radius: 10px; overflow: hidden; }
  th, td { padding: 15px; border-bottom: 1px solid #1f2937; text-align: left; }
  .tab-btn { background: #374151; margin-right: 5px; }
  .tab-btn.active { background: var(--accent); }
  .modal { display:none; position:fixed; top:20%; left:20%; background:#1a1d26; padding:20px; z-index:200; border-radius:12px; border:1px solid #374151; }
</style>
</head>
<body>

<div id="loginOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#111827; z-index:9999; display:flex; justify-content:center; align-items:center;">
  <div style="background:#1a1d26; padding:30px; border-radius:15px; border:1px solid #374151; text-align:center;">
    <h2 style="color:#fff;">ใส่รหัสผ่าน</h2>
    <input type="password" id="passInput" style="padding:10px; border-radius:8px; border:none; width:200px; background:#000; color:#fff;">
    <br><br>
    <button class="btn" onclick="verify()">เข้าใช้งาน</button>
  </div>
</div>

<div id="tabBar" style="margin-bottom: 20px;"></div>
<button class="btn" onclick="showModal('modalAddTab')">+ เพิ่มแฟ้ม</button>
<button class="btn" onclick="showModal('modalAdd')">+ เพิ่มข้อมูล</button>
<button class="btn" style="background:#4b5563" onclick="showModal('modalSearch')">🔍 ค้นหา</button>

<table>
  <thead><tr><th><input type="checkbox" id="selectAll" class="row-check" onclick="toggleSelectAll()"></th><th>USERNAME</th></tr></thead>
  <tbody id="tableBody"></tbody>
</table>

<div id="ctrlPanel">
  <button class="btn" style="background:#374151" onclick="copyData('username')">User</button>
  <button class="btn" style="background:#374151" onclick="copyData('password')">Pass</button>
  <button class="btn" style="background:#374151" onclick="copyData('userpass')">U:P</button>
  <button class="btn" style="background:#374151" onclick="copyData('cookie')">Cookie</button>
  <button class="btn" style="background:#374151" onclick="copyData('recovery')">Recovery</button>
  <button class="btn" style="background:#10b981" onclick="copyData('full')">Copy Full</button>
  <button class="btn" style="background:#f59e0b" onclick="copyData('combo')">Copy Combo</button>
  <button class="btn" style="background:#ef4444" onclick="deleteSelected()">Delete</button>
</div>

<!-- Modals -->
<div id="modalAdd" class="modal">
  <h2>เพิ่มข้อมูล</h2>
  <textarea id="dataInput" style="width:300px; height:100px; background:#000; color:#fff;"></textarea>
  <br><button class="btn" onclick="saveData()">บันทึก</button>
  <button class="btn" style="background:#444" onclick="hideModals()">ปิด</button>
</div>

<div id="modalSearch" class="modal">
  <h2>ค้นหา</h2>
  <textarea id="searchArea" style="width:300px; height:100px; background:#000; color:#fff;" oninput="render()"></textarea>
  <br><button class="btn" style="background:#444" onclick="hideModals()">ปิด</button>
</div>

<div id="modalAddTab" class="modal">
  <h2>ชื่อแฟ้ม</h2>
  <input id="tabNameInput" style="padding:10px;">
  <br><button class="btn" onclick="saveTab()">บันทึก</button>
</div>

<script>
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxWbYPHaDTjCDw2-L6fuQ1DU-CBFnN0xmP8HVdrbg4iL2juUPt5Dh3kVHuP87eilYePOQ/exec";
  let tabs = [{ name: 'หลัก', data: [] }];
  let currentTab = 0;
  let lastChecked = null;

  function verify() { 
    if (document.getElementById('passInput').value === "IWNR") { 
      document.getElementById('loginOverlay').style.display = 'none'; 
      loadFromSheet(); 
    } else { alert("รหัสผ่านผิด!"); } 
  }

  async function loadFromSheet() {
    try {
      const response = await fetch(WEB_APP_URL);
      const rawData = await response.json();
      if(rawData.length > 1 && rawData[1][1]) {
        tabs = JSON.parse(rawData[1][1]);
        render();
      }
    } catch(e) { console.error("Error loading data", e); }
  }

  async function saveToSheet() {
    await fetch(WEB_APP_URL, {
      method: 'POST',
      body: JSON.stringify([["Data", JSON.stringify(tabs)]])
    });
  }

  function render() {
    const query = document.getElementById('searchArea').value.toLowerCase();
    const queries = query.split('\n').filter(q => q.trim() !== "");
    document.getElementById('tabBar').innerHTML = tabs.map((t, i) => `
      <button class="btn tab-btn ${i === currentTab ? 'active' : ''}" onclick="currentTab=${i}; render()">
        ${t.name} <span onclick="event.stopPropagation(); deleteTab(${i})" style="color:#ef4444; margin-left:5px;">[x]</span>
      </button>`).join('');
    
    const tbody = document.getElementById('tableBody');
    const filtered = tabs[currentTab].data.map((d, i) => ({d, i})).filter(o => queries.length === 0 || queries.some(q => o.d.join(':').toLowerCase().includes(q)));
    tbody.innerHTML = filtered.map(o => `
      <tr id="row-${o.i}" onclick="toggleRow(${o.i}, event)">
        <td><input type="checkbox" class="row-check" id="check-${o.i}" data-index="${o.i}" onchange="updateMenu()"></td>
        <td>${o.d[0]||''}</td>
      </tr>`).join('');
    updateMenu();
  }

  function toggleSelectAll() {
    const isChecked = document.getElementById('selectAll').checked;
    document.querySelectorAll('.row-check').forEach(cb => { if(cb.id !== 'selectAll') { cb.checked = isChecked; document.getElementById('row-'+cb.dataset.index).classList.toggle('row-selected', isChecked); }});
    updateMenu();
  }

  function toggleRow(i, e) {
    if (e.shiftKey && lastChecked !== null) {
      let start = Math.min(i, lastChecked); let end = Math.max(i, lastChecked);
      for(let j=start; j<=end; j++) { if(document.getElementById('check-'+j)) { document.getElementById('check-'+j).checked = true; document.getElementById('row-'+j).classList.add('row-selected'); } }
    }
    lastChecked = i;
    document.getElementById('row-'+i).classList.toggle('row-selected', document.getElementById('check-'+i).checked);
    updateMenu();
  }

  function updateMenu() {
    const boxes = document.querySelectorAll('.row-check:not(#selectAll)');
    const checked = Array.from(boxes).filter(c => c.checked);
    document.getElementById('selectAll').checked = (checked.length === boxes.length && boxes.length > 0);
    document.getElementById('ctrlPanel').style.display = checked.length > 0 ? 'block' : 'none';
  }

  function copyData(type) {
    const text = Array.from(document.querySelectorAll('.row-check:checked:not(#selectAll)')).map(cb => {
      const d = tabs[currentTab].data[cb.dataset.index];
      const u=d[0], p=d[1], c=d.slice(2, d.length-2).join(':'), r=d.slice(d.length-2).join(':');
      switch(type) {
        case 'username': return u; case 'password': return p; case 'userpass': return u+":"+p;
        case 'cookie': return c; case 'recovery': return r;
        case 'full': return `${u}:${p}:${c}:${r}`; case 'combo': return `${u}:${p}:${c}`;
      }
    }).join('\n');
    navigator.clipboard.writeText(text); alert('คัดลอกสำเร็จ!');
  }

  function deleteSelected() { 
    Array.from(document.querySelectorAll('.row-check:checked:not(#selectAll)')).reverse().forEach(cb => tabs[currentTab].data.splice(cb.dataset.index, 1)); 
    saveToSheet().then(() => render()); 
  }

  function saveTab() { 
    tabs.push({ name: document.getElementById('tabNameInput').value, data: [] }); 
    saveToSheet().then(() => render()); 
    hideModals(); 
  }

  function deleteTab(i) { 
    tabs.splice(i, 1); 
    saveToSheet().then(() => render()); 
  }

  function saveData() { 
    document.getElementById('dataInput').value.split('\n').forEach(l => { if(l) tabs[currentTab].data.push(l.split(':')); }); 
    saveToSheet().then(() => render()); 
    hideModals(); 
  }

  function showModal(id) { document.getElementById(id).style.display = 'block'; }
  function hideModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
</script>
</body>
</html>
